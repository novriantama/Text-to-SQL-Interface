version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: text_to_sql_postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-text_to_sql_db}
      POSTGRES_USER: ${POSTGRES_USER:-text_sql_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/init_seed.sql:/docker-entrypoint-initdb.d/init_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-text_sql_admin} -d ${POSTGRES_DB:-text_to_sql_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: text_to_sql_api
    command: uvicorn src.presentation.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - READONLY_DB_URI=postgresql://${POSTGRES_USER:-text_sql_admin}:${POSTGRES_PASSWORD:-admin_password}@postgres:5432/${POSTGRES_DB:-text_to_sql_db}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: text_to_sql_frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  postgres_data:
